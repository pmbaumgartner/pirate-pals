name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y lua-check
      - run: luacheck .

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y lua5.4
      - run: make test LUA=lua5.4

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LÖVE and xvfb
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          curl -fsSL -o love.AppImage \
            https://github.com/love2d/love/releases/download/11.5/love-11.5-x86_64.AppImage
          chmod +x love.AppImage
      - name: Run smoke test
        run: xvfb-run -a ./love.AppImage --appimage-extract-and-run . --smoke --shots
      # Per-state PNGs for human eyeballing (no golden-image diffing); the
      # automated visual gate is the bounds invariant inside the smoke run.
      - name: Upload state screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-shots
          path: ~/.local/share/love/pirate-pals/*.png
          if-no-files-found: warn

  package:
    needs: [luacheck, unit-tests, smoke]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win64
            artifact: pirate-pals-windows
          - target: macos
            artifact: pirate-pals-macos
          - target: appimage
            artifact: pirate-pals-linux-steam-deck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install makelove
        run: python -m pip install "setuptools==70.0.0" makelove
      - name: Build ${{ matrix.target }}
        run: makelove ${{ matrix.target }}
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
      - name: Preserve executable artifact
        if: matrix.target == 'appimage'
        run: |
          chmod +x build/appimage/*.AppImage
          tar -C build/appimage -czf build/${{ matrix.artifact }}.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/${{ matrix.target }}/*.zip
            build/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: pirate-pals-windows
          path: release-assets
      - name: Download macOS package
        uses: actions/download-artifact@v4
        with:
          name: pirate-pals-macos
          path: release-assets
      - name: Download Linux / Steam Deck package
        uses: actions/download-artifact@v4
        with:
          name: pirate-pals-linux-steam-deck
          path: release-assets
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t assets < <(find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No package assets found"
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --verify-tag \
              --title "Pirate Pals $TAG_NAME" \
              --notes "Automated builds from commit $GITHUB_SHA."
          fi
